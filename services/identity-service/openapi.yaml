openapi: 3.1.0
info:
  title: CareCareer Identity Service
  version: 0.1.0
  description: |
    Identity service for user management, external identity linking,
    and platform-level administration.

servers:
  - url: http://localhost:3100
    description: Local development

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Platform JWT (demo HS256 in development, RS256 in production).
        Required permissions: platform.users.read, platform.users.manage

  schemas:
    UserStatus:
      type: string
      enum: [ACTIVE, SUSPENDED, DEACTIVATED]

    User:
      type: object
      required: [id, displayName, primaryEmail, status, authorizationVersion, createdAt, version]
      properties:
        id:
          type: string
          format: uuid
        displayName:
          type: string
          maxLength: 200
        primaryEmail:
          type: string
          format: email
          maxLength: 320
        status:
          $ref: '#/components/schemas/UserStatus'
        authorizationVersion:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        version:
          type: integer

    ExternalIdentity:
      type: object
      required: [id, userId, issuer, subject, providerType, createdAt]
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        issuer:
          type: string
          maxLength: 500
        subject:
          type: string
          maxLength: 500
        providerType:
          type: string
          enum: [entra, okta, auth0, mock]
        emailClaim:
          type: string
          format: email
          nullable: true
        displayNameClaim:
          type: string
          nullable: true
        lastAuthenticatedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time

    Pagination:
      type: object
      required: [offset, limit, total]
      properties:
        offset:
          type: integer
        limit:
          type: integer
        total:
          type: integer

    ErrorEnvelope:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
        errors:
          type: array
          items:
            type: object

    CreateUserRequest:
      type: object
      required: [displayName, primaryEmail]
      additionalProperties: false
      properties:
        displayName:
          type: string
          minLength: 1
          maxLength: 200
        primaryEmail:
          type: string
          format: email
          maxLength: 320

    ChangeUserStatusRequest:
      type: object
      required: [status, reason, version]
      additionalProperties: false
      properties:
        status:
          $ref: '#/components/schemas/UserStatus'
        reason:
          type: string
          minLength: 1
          maxLength: 500
        version:
          type: integer
          minimum: 1
          description: Expected current version for optimistic concurrency

    LinkExternalIdentityRequest:
      type: object
      required: [issuer, subject, providerType]
      additionalProperties: false
      properties:
        issuer:
          type: string
          minLength: 1
          maxLength: 500
        subject:
          type: string
          minLength: 1
          maxLength: 500
        providerType:
          type: string
          enum: [entra, okta, auth0, mock]
        emailClaim:
          type: string
          format: email
          maxLength: 320
        displayNameClaim:
          type: string
          maxLength: 200

  parameters:
    CorrelationId:
      name: x-correlation-id
      in: header
      schema:
        type: string
        format: uuid
      description: Distributed tracing correlation ID

paths:
  /health:
    get:
      summary: Liveness check
      security: []
      operationId: healthLiveness
      responses:
        '200':
          description: Service is alive
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [healthy]
                  service:
                    type: string

  /ready:
    get:
      summary: Readiness check (includes PostgreSQL)
      security: []
      operationId: healthReadiness
      responses:
        '200':
          description: Service is ready to handle traffic
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [healthy, unhealthy]
                  checks:
                    type: object
                    properties:
                      postgresql:
                        type: string
                        enum: [healthy, unhealthy]

  /v1/platform/users:
    post:
      summary: Create a platform user
      operationId: createUser
      description: Requires permission platform.users.manage
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/User'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Authentication required
        '403':
          description: Insufficient permissions
        '409':
          description: Duplicate user

    get:
      summary: List platform users
      operationId: listUsers
      description: Requires permission platform.users.read
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/UserStatus'
        - name: search
          in: query
          schema:
            type: string
            maxLength: 200
      responses:
        '200':
          description: Paginated user list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '401':
          description: Authentication required
        '403':
          description: Insufficient permissions

  /v1/platform/users/{userId}:
    get:
      summary: Get user by ID
      operationId: getUser
      description: Requires permission platform.users.read
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: User found
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/User'
        '400':
          description: Invalid UUID format
        '401':
          description: Authentication required
        '403':
          description: Insufficient permissions
        '404':
          description: User not found

  /v1/platform/users/{userId}/status:
    patch:
      summary: Change user lifecycle status
      operationId: changeUserStatus
      description: |
        Requires permission platform.users.manage.
        Valid transitions: ACTIVE→SUSPENDED, SUSPENDED→ACTIVE,
        ACTIVE→DEACTIVATED, SUSPENDED→DEACTIVATED.
        DEACTIVATED is terminal.
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangeUserStatusRequest'
      responses:
        '200':
          description: Status changed
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/User'
        '400':
          description: Validation error
        '401':
          description: Authentication required
        '403':
          description: Insufficient permissions
        '404':
          description: User not found
        '409':
          description: Version conflict or invalid transition

  /v1/platform/users/{userId}/external-identities:
    post:
      summary: Link an external identity to a user
      operationId: linkExternalIdentity
      description: |
        Requires permission platform.users.manage.
        Enforces UNIQUE(issuer, subject).
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LinkExternalIdentityRequest'
      responses:
        '201':
          description: External identity linked
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/ExternalIdentity'
        '400':
          description: Validation error
        '401':
          description: Authentication required
        '403':
          description: Insufficient permissions
        '404':
          description: User not found
        '409':
          description: Duplicate issuer+subject

    get:
      summary: List external identities for a user
      operationId: listExternalIdentities
      description: Requires permission platform.users.read
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: External identities list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ExternalIdentity'
        '400':
          description: Invalid UUID format
        '401':
          description: Authentication required
        '403':
          description: Insufficient permissions

  /v1/tenants/{tenantId}/members:
    post:
      summary: Create a tenant membership
      operationId: createMember
      description: Requires permission tenant.members.manage
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId]
              additionalProperties: false
              properties:
                userId:
                  type: string
                  format: uuid
                status:
                  type: string
                  enum: [INVITED, ACTIVE]
      responses:
        '201':
          description: Membership created
        '400':
          description: Validation error
        '401':
          description: Authentication required
        '403':
          description: Insufficient permissions
        '404':
          description: User not found (hidden cross-tenant 404)
        '409':
          description: Duplicate membership

    get:
      summary: List tenant members
      operationId: listMembers
      description: Requires permission tenant.members.read
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/CorrelationId'
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: status
          in: query
          schema:
            type: string
            enum: [INVITED, ACTIVE, SUSPENDED, DEACTIVATED]
      responses:
        '200':
          description: Paginated member list
        '401':
          description: Authentication required
        '403':
          description: Insufficient permissions

  /v1/tenants/{tenantId}/members/{membershipId}:
    get:
      summary: Get membership by ID
      operationId: getMember
      description: Requires permission tenant.members.read
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: membershipId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: Membership found
        '400':
          description: Invalid UUID format
        '401':
          description: Authentication required
        '403':
          description: Insufficient permissions
        '404':
          description: Membership not found

  /v1/tenants/{tenantId}/members/{membershipId}/status:
    patch:
      summary: Change membership status
      operationId: changeMemberStatus
      description: |
        Requires permission tenant.members.manage.
        Valid transitions: INVITED→ACTIVE, ACTIVE→SUSPENDED,
        SUSPENDED→ACTIVE, ACTIVE→DEACTIVATED, SUSPENDED→DEACTIVATED.
        DEACTIVATED is terminal. Requires expected version for optimistic concurrency.
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: membershipId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status, reason, version]
              additionalProperties: false
              properties:
                status:
                  type: string
                  enum: [ACTIVE, SUSPENDED, DEACTIVATED]
                reason:
                  type: string
                  minLength: 1
                  maxLength: 500
                version:
                  type: integer
                  minimum: 1
                  description: Expected current version for optimistic concurrency
      responses:
        '200':
          description: Status changed
        '400':
          description: Validation error
        '401':
          description: Authentication required
        '403':
          description: Insufficient permissions
        '404':
          description: Membership not found
        '409':
          description: Version conflict or invalid transition

  /v1/tenants/{tenantId}/members/{membershipId}/roles:
    get:
      summary: List membership roles
      operationId: getMemberRoles
      description: Requires permission tenant.members.read
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: membershipId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Assigned roles list
        '401':
          description: Authentication required
        '403':
          description: Insufficient permissions

    put:
      summary: Replace membership role assignments
      operationId: assignMemberRoles
      description: |
        Requires permission tenant.roles.assign.
        Replaces current role set with provided roles.
        Requires expected version for optimistic concurrency.
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: membershipId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [roleIds, version]
              additionalProperties: false
              properties:
                roleIds:
                  type: array
                  items:
                    type: string
                    format: uuid
                  maxItems: 10
                version:
                  type: integer
                  minimum: 1
      responses:
        '200':
          description: Roles assigned
        '400':
          description: Validation error or invalid role
        '401':
          description: Authentication required
        '403':
          description: Insufficient permissions
        '404':
          description: Membership not found
        '409':
          description: Version conflict

  /v1/tenants/{tenantId}/members/{membershipId}/permissions:
    get:
      summary: Derive effective permissions for membership
      operationId: getMemberPermissions
      description: |
        Requires permission tenant.members.read.
        Returns empty for non-ACTIVE memberships.
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: membershipId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Effective permissions
        '401':
          description: Authentication required
        '403':
          description: Insufficient permissions

  /v1/tenants/{tenantId}/roles:
    get:
      summary: List available tenant roles
      operationId: listTenantRoles
      description: Requires permission tenant.members.read
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: System tenant roles
        '401':
          description: Authentication required
        '403':
          description: Insufficient permissions

  /v1/permissions:
    get:
      summary: List permission catalog
      operationId: listAllPermissions
      description: Requires any authenticated user with tenant.members.read
      responses:
        '200':
          description: All defined permissions
        '401':
          description: Authentication required
        '403':
          description: Insufficient permissions

  /v1/platform/users/{userId}/memberships:
    get:
      summary: List all memberships for a user
      operationId: listUserMemberships
      description: Requires permission platform.users.read
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: User memberships across tenants
        '401':
          description: Authentication required
        '403':
          description: Insufficient permissions

  /v1/platform/users/{userId}/platform-roles:
    get:
      summary: List platform role assignments for a user
      operationId: listUserPlatformRoles
      description: Requires permission platform.users.read
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Platform role assignments
        '401':
          description: Authentication required
        '403':
          description: Insufficient permissions

    put:
      summary: Set platform roles for a user
      operationId: setPlatformRoles
      description: |
        Requires permission platform.users.manage.
        Administrative path only. Replaces current assignments.
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [roleIds]
              additionalProperties: false
              properties:
                roleIds:
                  type: array
                  items:
                    type: string
                    format: uuid
                  maxItems: 5
      responses:
        '200':
          description: Platform roles updated
        '400':
          description: Invalid role or validation error
        '401':
          description: Authentication required
        '403':
          description: Insufficient permissions
        '404':
          description: User not found

  /v1/auth/refresh:
    post:
      summary: Refresh access token
      operationId: refreshSession
      security: []
      description: |
        Exchange a valid refresh token for a new access token and rotated refresh token.
        Previous refresh token becomes immediately unusable.
        Replay of a rotated token revokes the entire token family.
        Cache-Control: no-store.
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:
                    type: string
                  refreshToken:
                    type: string
                  expiresIn:
                    type: integer
                    description: Access token lifetime in seconds (900 = 15 min)
        '401':
          description: Invalid, expired, revoked, or replayed refresh token

  /v1/auth/logout:
    post:
      summary: Logout current session
      operationId: logout
      description: |
        Revoke the current session. Idempotent — repeated calls succeed.
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: Logged out
        '401':
          description: Authentication required

  /v1/auth/logout-all:
    post:
      summary: Revoke all active sessions
      operationId: logoutAll
      description: Revokes every active session belonging to the authenticated user.
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: All sessions revoked
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  revokedCount:
                    type: integer
        '401':
          description: Authentication required

  /v1/auth/sessions:
    get:
      summary: List active sessions
      operationId: listSessions
      description: Returns safe metadata for the current user's active sessions.
      responses:
        '200':
          description: Session list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                        createdAt:
                          type: string
                          format: date-time
                        lastUsedAt:
                          type: string
                          format: date-time
                        expiresAt:
                          type: string
                          format: date-time
                        status:
                          type: string
        '401':
          description: Authentication required

  /v1/auth/sessions/{sessionId}:
    delete:
      summary: Revoke a specific session
      operationId: revokeSession
      description: |
        Revoke one of the current user's sessions.
        Returns hidden 404 if session belongs to another user.
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: Session revoked
        '401':
          description: Authentication required
        '404':
          description: Session not found or belongs to another user

  /v1/auth/me:
    get:
      summary: Get current authenticated identity
      operationId: getCurrentIdentity
      description: |
        Returns the current CareCareer identity and active authorization context.
        No unrelated tenant data is exposed.
      responses:
        '200':
          description: Current identity
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      userId:
                        type: string
                        format: uuid
                      displayName:
                        type: string
                      status:
                        $ref: '#/components/schemas/UserStatus'
                      authorizationVersion:
                        type: integer
                      platformRoles:
                        type: array
                        items:
                          type: string
                      tenantMemberships:
                        type: array
                        items:
                          type: object
                          properties:
                            tenantId:
                              type: string
                            roles:
                              type: array
                              items:
                                type: string
                            status:
                              type: string
        '401':
          description: Authentication required

  /.well-known/jwks.json:
    get:
      summary: JSON Web Key Set
      operationId: getJwks
      security: []
      description: |
        Returns public verification keys for platform JWT validation.
        Includes active and approved overlap keys. Never exposes private fields.
        Appropriate cache headers are set.
      responses:
        '200':
          description: JWKS
          content:
            application/json:
              schema:
                type: object
                properties:
                  keys:
                    type: array
                    items:
                      type: object
                      properties:
                        kty:
                          type: string
                        kid:
                          type: string
                        use:
                          type: string
                        alg:
                          type: string
                        n:
                          type: string
                        e:
                          type: string

  /v1/authorization/decisions:
    post:
      summary: Evaluate an authorization decision
      description: |
        Evaluates whether the authenticated principal is authorized to perform
        the specified action on a resource within their active tenant context.

        The principal, tenant, roles, permissions and authorization versions are
        derived exclusively from the validated session and server-side state.
        The request body may contain only the action and resource identification.

        Default behavior is DENY. Explicit denials override all grants.
      operationId: evaluateAuthorizationDecision
      tags: [Authorization]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action, resourceType]
              additionalProperties: false
              properties:
                action:
                  type: string
                  minLength: 1
                  maxLength: 200
                  description: The action identifier (e.g. facility.read, shift.create)
                  example: tenant.members.read
                resourceType:
                  type: string
                  minLength: 1
                  maxLength: 100
                  description: The resource type
                  example: member
                resourceId:
                  type: string
                  format: uuid
                  description: Optional specific resource ID
                  example: 019f8580-aaac-736b-bd0b-f822d257826d
      responses:
        '200':
          description: Authorization decision result
          content:
            application/json:
              schema:
                type: object
                required: [decisionId, allowed, reasonCode, evaluatedAt, policyVersion]
                properties:
                  decisionId:
                    type: string
                    format: uuid
                  allowed:
                    type: boolean
                  reasonCode:
                    type: string
                    enum:
                      - GRANTED
                      - USER_SUSPENDED
                      - USER_DEACTIVATED
                      - MEMBERSHIP_INVALID
                      - VERSION_STALE
                      - EXPLICIT_DENY
                      - NO_MATCHING_GRANT
                  evaluatedAt:
                    type: string
                    format: date-time
                  policyVersion:
                    type: integer
              examples:
