# CareCareer demo reverse proxy
# All traffic through http://localhost:8080

upstream identity_backend {
    server identity-service:3100;
}

upstream platform_backend {
    server platform-service:3000;
}

upstream staffing_backend {
    server staffing-service:3200;
}

upstream web_frontend {
    server carecareer-web:80;
}

server {
    listen 80;
    server_name localhost;

    # Health check for the proxy itself
    location = /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # Identity service APIs
    location /api/auth/ {
        proxy_pass http://identity_backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Demo token endpoint (identity service)
    location /api/demo/ {
        proxy_pass http://identity_backend/demo/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Platform service APIs
    location /api/v1/tenants {
        proxy_pass http://platform_backend/v1/tenants;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/v1/organizations {
        proxy_pass http://platform_backend/v1/organizations;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/v1/entitlements {
        proxy_pass http://platform_backend/v1/entitlements;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/v1/features {
        proxy_pass http://platform_backend/v1/features;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Staffing service APIs (shifts, marketplace, assignments, timekeeping, etc.)
    location /api/v1/ {
        proxy_pass http://staffing_backend/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Frontend (SPA with fallback)
    location / {
        proxy_pass http://web_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
