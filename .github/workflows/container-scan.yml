name: Container Security

on:
  pull_request:
    branches: [main, master]
    paths:
      - '**/Dockerfile'
      - '**/docker-compose*.yml'
      - 'pnpm-lock.yaml'
      - '**/package.json'
      - 'services/staffing-service/**'
      - 'services/identity-service/**'
      - 'packages/auth/**'
      - 'packages/database/**'
      - 'packages/events/**'
  push:
    branches: [main, master]
    paths:
      - '**/Dockerfile'
      - '**/docker-compose*.yml'
      - 'pnpm-lock.yaml'
      - '**/package.json'

permissions:
  contents: read

jobs:
  scan:
    name: Scan filesystem for vulnerabilities
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@c07df6fec6fa692e6fd1200d50aaa1fdd66f03c8 # main HEAD
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          format: 'table'

      - name: Lint Dockerfiles
        uses: hadolint/hadolint-action@54c9adbab1582c2ef04b2016b760714a4bfde3cf # v3.1.0
        with:
          recursive: true
          failure-threshold: error
