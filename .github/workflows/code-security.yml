name: Code Security

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
  schedule:
    - cron: '0 6 * * 1'

permissions:
  security-events: write
  contents: read

jobs:
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        # actions/checkout@v4 pinned to commit SHA
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Initialize CodeQL
        # github/codeql-action/init@v3 pinned to commit SHA
        uses: github/codeql-action/init@4e828ffe61b2ed4a37cfc3d8d474f3e4e2e5c7b0
        with:
          languages: javascript-typescript

      - name: Autobuild
        uses: github/codeql-action/autobuild@4e828ffe61b2ed4a37cfc3d8d474f3e4e2e5c7b0

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@4e828ffe61b2ed4a37cfc3d8d474f3e4e2e5c7b0
