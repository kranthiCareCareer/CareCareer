name: DEMO-01 E2E

on:
  push:
    branches: [master, main]
    paths:
      - 'apps/platform-admin-console/**'
      - 'services/platform-service/**'
      - 'packages/**'
      - 'scripts/**'
      - 'docker-compose.demo.yml'
  pull_request:
    branches: [master, main]
    paths:
      - 'apps/platform-admin-console/**'
      - 'services/platform-service/**'
      - 'packages/**'
      - 'scripts/**'
      - 'docker-compose.demo.yml'
  workflow_dispatch:

concurrency:
  group: demo-e2e-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '9.15.4'

jobs:
  demo-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci_admin
          POSTGRES_PASSWORD: ${{ github.run_id }}_${{ github.run_attempt }}
          POSTGRES_DB: carecareer_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://ci_admin:${{ github.run_id }}_${{ github.run_attempt }}@localhost:5432/carecareer_ci
      NODE_ENV: development
      DEMO_MODE: 'true'
      DEMO_AUTH_SECRET: ci-ephemeral-auth-secret-not-for-production-use-0123456789abcdef
      PORT: '3001'
      HOST: '0.0.0.0'

    steps:
      - name: Checkout repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm --filter @carecareer/platform-admin-console exec playwright install --with-deps chromium

      - name: Apply migrations
        run: |
          if [ -f services/platform-service/prisma/migrations/001_initial_schema.sql ]; then
            PGPASSWORD="${{ github.run_id }}_${{ github.run_attempt }}" psql -h localhost -U ci_admin -d carecareer_ci \
              -f services/platform-service/prisma/migrations/001_initial_schema.sql
          fi

      - name: Seed demo data
        run: |
          if [ -f services/platform-service/prisma/seed-demo.sql ]; then
            PGPASSWORD="${{ github.run_id }}_${{ github.run_attempt }}" psql -h localhost -U ci_admin -d carecareer_ci \
              -f services/platform-service/prisma/seed-demo.sql
          fi

      - name: Build packages
        run: pnpm build

      - name: Start backend
        run: |
          cd services/platform-service
          nohup npx tsx src/main.ts > /tmp/backend.log 2>&1 &
          echo $! > /tmp/backend.pid

      - name: Start frontend
        run: |
          cd apps/platform-admin-console
          nohup npx vite --port 4000 --host > /tmp/frontend.log 2>&1 &
          echo $! > /tmp/frontend.pid

      - name: Wait for readiness
        run: |
          echo "Waiting for backend..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3001/health/live > /dev/null 2>&1; then
              echo "Backend ready"
              break
            fi
            sleep 2
          done
          echo "Waiting for frontend..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:4000 > /dev/null 2>&1; then
              echo "Frontend ready"
              break
            fi
            sleep 2
          done

      - name: Run Chromium E2E tests
        run: pnpm demo:e2e

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-report
          path: apps/platform-admin-console/playwright-report/
          retention-days: 14

      - name: Cleanup
        if: always()
        run: |
          [ -f /tmp/backend.pid ] && kill "$(cat /tmp/backend.pid)" 2>/dev/null || true
          [ -f /tmp/frontend.pid ] && kill "$(cat /tmp/frontend.pid)" 2>/dev/null || true
