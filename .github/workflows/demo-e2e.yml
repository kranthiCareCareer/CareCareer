name: DEMO-01 E2E

on:
  push:
    branches: [master, main]
    paths:
      - 'apps/platform-admin-console/**'
      - 'services/platform-service/**'
      - 'packages/**'
      - 'scripts/**'
      - 'docker-compose.demo.yml'
  pull_request:
    branches: [master, main]
    paths:
      - 'apps/platform-admin-console/**'
      - 'services/platform-service/**'
      - 'packages/**'
      - 'scripts/**'
      - 'docker-compose.demo.yml'
  workflow_dispatch:

concurrency:
  group: demo-e2e-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '24'
  PNPM_VERSION: '9.15.4'

jobs:
  demo-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: carecareer_admin
          POSTGRES_PASSWORD: demo_password_not_for_production
          POSTGRES_DB: carecareer_demo
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://carecareer_admin:demo_password_not_for_production@localhost:5432/carecareer_demo
      NODE_ENV: development
      DEMO_MODE: 'true'
      DEMO_AUTH_SECRET: carecareer-demo-secret-for-testing-only-do-not-use-in-production
      PORT: '3001'
      HOST: '0.0.0.0'

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup pnpm
        uses: pnpm/action-setup@fe02b34f77f8bc703788d534f2ed8388abd93613
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Apply migrations
        run: |
          if [ -f services/platform-service/prisma/migrations/001_initial_schema.sql ]; then
            PGPASSWORD=demo_password_not_for_production psql -h localhost -U carecareer_admin -d carecareer_demo \
              -f services/platform-service/prisma/migrations/001_initial_schema.sql
          fi

      - name: Seed demo data
        run: |
          if [ -f services/platform-service/prisma/seed-demo.sql ]; then
            PGPASSWORD=demo_password_not_for_production psql -h localhost -U carecareer_admin -d carecareer_demo \
              -f services/platform-service/prisma/seed-demo.sql
          fi

      - name: Build packages
        run: pnpm build

      - name: Start backend
        run: |
          cd services/platform-service
          printf "DATABASE_URL=%s\nPORT=3001\nHOST=0.0.0.0\nNODE_ENV=development\nDEMO_MODE=true\nDEMO_AUTH_SECRET=carecareer-demo-secret-for-testing-only-do-not-use-in-production\n" "$DATABASE_URL" > .env
          nohup node dist/main.js > /tmp/backend.log 2>&1 &
          echo $! > /tmp/backend.pid

      - name: Start frontend
        run: |
          cd apps/platform-admin-console
          nohup npx vite --port 4000 --host > /tmp/frontend.log 2>&1 &
          echo $! > /tmp/frontend.pid

      - name: Wait for readiness
        run: |
          echo "Waiting for backend..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3001/health > /dev/null 2>&1; then
              echo "Backend ready after ${i}s"
              break
            fi
            sleep 2
          done
          echo "Waiting for frontend..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:4000 > /dev/null 2>&1; then
              echo "Frontend ready after ${i}s"
              break
            fi
            sleep 2
          done

      - name: Run Chromium E2E tests
        run: pnpm demo:e2e

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb2cf8a3
        with:
          name: playwright-report
          path: apps/platform-admin-console/playwright-report/
          retention-days: 14

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb2cf8a3
        with:
          name: test-results
          path: |
            apps/platform-admin-console/test-results/
            apps/platform-admin-console/artifacts/demo-screenshots/
          retention-days: 14

      - name: Cleanup
        if: always()
        run: |
          [ -f /tmp/backend.pid ] && kill "$(cat /tmp/backend.pid)" 2>/dev/null || true
          [ -f /tmp/frontend.pid ] && kill "$(cat /tmp/frontend.pid)" 2>/dev/null || true
