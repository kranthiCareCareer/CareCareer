name: Secret Scanning

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  gitleaks:
    name: Detect secrets
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        # actions/checkout@v4 pinned to commit SHA
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        # gitleaks/gitleaks-action pinned to known SHA
        uses: gitleaks/gitleaks-action@44c470ffefd08d2f40e01672f3f7ef1d4c3b1ef2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
