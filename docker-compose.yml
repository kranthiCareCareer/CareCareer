version: '3.9'

services:
  # =============================================================================
  # PostgreSQL — Core business database
  # =============================================================================
  postgres:
    image: postgres:16-alpine
    container_name: carecareer-postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: carecareer
      POSTGRES_PASSWORD: carecareer_dev
      POSTGRES_DB: carecareer
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U carecareer']
      interval: 5s
      timeout: 5s
      retries: 5

  # =============================================================================
  # Redis — Cache, sessions, job queues (BullMQ)
  # =============================================================================
  redis:
    image: redis:7-alpine
    container_name: carecareer-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  # =============================================================================
  # MinIO — S3-compatible object storage (documents, resumes, credentials)
  # =============================================================================
  minio:
    image: minio/minio:latest
    container_name: carecareer-minio
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: carecareer_dev
      MINIO_ROOT_PASSWORD: carecareer_dev_secret
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 5s
      retries: 5

  # =============================================================================
  # Meilisearch — Full-text search (candidates, jobs, facilities)
  # =============================================================================
  meilisearch:
    image: getmeili/meilisearch:v1.11
    container_name: carecareer-meilisearch
    ports:
      - '7700:7700'
    environment:
      MEILI_MASTER_KEY: carecareer_dev_key
      MEILI_ENV: development
    volumes:
      - meilisearch_data:/meili_data
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--spider', 'http://localhost:7700/health']
      interval: 5s
      timeout: 5s
      retries: 5

  # =============================================================================
  # Mailpit — Email testing (catches all outbound email locally)
  # =============================================================================
  mailpit:
    image: axllent/mailpit:latest
    container_name: carecareer-mailpit
    ports:
      - '1025:1025'
      - '8025:8025'

volumes:
  postgres_data:
  redis_data:
  minio_data:
  meilisearch_data:
