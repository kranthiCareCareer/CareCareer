##
# CareCareer Standard Playwright E2E Runner
#
# Runs the standard @playwright/test runner against services accessible on the host.
# Uses host network mode to reach localhost:4000 (frontend) and localhost:3001 (backend).
#
# Prerequisites: Start demo services before running.
#   pnpm demo:up && start backend && start frontend
#
# Usage:
#   docker compose -f docker-compose.e2e.yml run --rm playwright-runner --project=chromium --reporter=line
#   docker compose -f docker-compose.e2e.yml run --rm playwright-runner --project=firefox-nightly
##
services:
  playwright-runner:
    build:
      context: .
      dockerfile: docker/e2e/Dockerfile
    network_mode: host
    environment:
      CI: '1'
      HOME: /tmp
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
    volumes:
      - playwright-browsers:/ms-playwright
    entrypoint: ['pnpm', 'exec', 'playwright', 'test']
    command: ['--project=chromium', '--reporter=line']

volumes:
  playwright-browsers:
