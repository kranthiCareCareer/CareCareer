# CareCareer Local MVP Demo Environment
# Usage: make demo-up (or docker compose -f docker-compose.demo.yml up -d)
# All services accessible via reverse proxy at http://localhost:8080

services:
  # ─── Infrastructure ────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: carecareer-demo-postgres
    environment:
      POSTGRES_USER: carecareer_admin
      POSTGRES_PASSWORD: demo_password_not_for_production
      POSTGRES_DB: carecareer_demo
    ports:
      - '5432:5432'
    volumes:
      - demo_pgdata:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres/init-demo.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U carecareer_admin']
      interval: 2s
      timeout: 5s
      retries: 10

  mailhog:
    image: axllent/mailpit:latest
    container_name: carecareer-demo-mailhog
    ports:
      - '1025:1025'
      - '8025:8025'
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--spider', 'http://127.0.0.1:8025']
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── Backend Services ──────────────────────────────────────────────────────

  identity-service:
    build:
      context: .
      dockerfile: docker/demo/Dockerfile.service
      args:
        SERVICE_NAME: identity-service
    container_name: carecareer-demo-identity
    ports:
      - '3100:3100'
    environment:
      PORT: '3100'
      HOST: '0.0.0.0'
      NODE_ENV: development
      DATABASE_URL: postgresql://carecareer_admin:demo_password_not_for_production@postgres:5432/carecareer_demo
      DEMO_MODE: 'true'
      DEMO_AUTH_SECRET: carecareer-demo-secret-for-testing-only-do-not-use-in-production
      JWT_ISSUER: carecareer-identity
      JWT_AUDIENCE: carecareer-api
      SERVICE_NAME: identity-service
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--spider', 'http://127.0.0.1:3100/health']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  platform-service:
    build:
      context: .
      dockerfile: docker/demo/Dockerfile.service
      args:
        SERVICE_NAME: platform-service
    container_name: carecareer-demo-platform
    ports:
      - '3001:3000'
    environment:
      PORT: '3000'
      HOST: '0.0.0.0'
      NODE_ENV: development
      DATABASE_URL: postgresql://carecareer_admin:demo_password_not_for_production@postgres:5432/carecareer_demo
      DEMO_MODE: 'true'
      DEMO_AUTH_SECRET: carecareer-demo-secret-for-testing-only-do-not-use-in-production
      IDENTITY_SERVICE_URL: http://identity-service:3100
      SERVICE_NAME: platform-service
    depends_on:
      postgres:
        condition: service_healthy
      identity-service:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--spider', 'http://127.0.0.1:3000/health/live']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  staffing-service:
    build:
      context: .
      dockerfile: docker/demo/Dockerfile.service
      args:
        SERVICE_NAME: staffing-service
    container_name: carecareer-demo-staffing
    ports:
      - '3200:3200'
    environment:
      PORT: '3200'
      HOST: '0.0.0.0'
      NODE_ENV: development
      DATABASE_URL: postgresql://carecareer_admin:demo_password_not_for_production@postgres:5432/carecareer_demo
      IDENTITY_SERVICE_URL: http://identity-service:3100
      JWKS_URI: http://identity-service:3100/.well-known/jwks.json
      JWT_ISSUER: carecareer-identity
      JWT_AUDIENCE: carecareer-api
      SERVICE_NAME: staffing-service
      SMTP_HOST: mailhog
      SMTP_PORT: '1025'
    depends_on:
      postgres:
        condition: service_healthy
      identity-service:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--spider', 'http://127.0.0.1:3200/health']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  # ─── Frontend ──────────────────────────────────────────────────────────────

  carecareer-web:
    build:
      context: .
      dockerfile: docker/demo/Dockerfile.web
    container_name: carecareer-demo-web
    ports:
      - '5173:80'
    depends_on:
      identity-service:
        condition: service_healthy
      platform-service:
        condition: service_healthy
      staffing-service:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--spider', 'http://127.0.0.1:80']
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── Reverse Proxy ─────────────────────────────────────────────────────────

  nginx:
    image: nginx:alpine
    container_name: carecareer-demo-proxy
    ports:
      - '8080:80'
    volumes:
      - ./docker/demo/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      carecareer-web:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--spider', 'http://127.0.0.1:80/health']
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  demo_pgdata:
